<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test4 - 삼각함수 간의 관계 테스트</title>
  <link rel="stylesheet" href="../assets/common.css" />
  <style>
    .inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .primary-btn:hover {
      background: #1d4ed8;
    }

    .question-card {
      border: 1px solid #e7eef7;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      background: #fcfdff;
    }

    .question-card:last-child {
      margin-bottom: 0;
    }

    .q-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #111827;
      line-height: 1.6;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #dbe4f0;
      border-radius: 14px;
      padding: 12px 14px;
      background: white;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
      line-height: 1.5;
    }

    .option-label:hover {
      background: #f8fafc;
      border-color: #bfdbfe;
    }

    .option-label input {
      margin: 0;
      transform: scale(1.1);
    }

    .result-box {
      margin-top: 16px;
      min-height: 64px;
    }

    .result-box.pass {
      background: #ecfdf5;
      border-color: #a7f3d0;
      color: #065f46;
    }

    .result-box.fail {
      background: #fef2f2;
      border-color: #fecaca;
      color: #991b1b;
    }

    .mini-note {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.7;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-card {
      width: min(560px, 100%);
      background: white;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.18);
    }

    .modal-card h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .modal-card p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .check-list {
      display: grid;
      gap: 10px;
      margin: 14px 0 18px;
    }

    .check-item {
      border: 1px solid #e5edf6;
      border-radius: 14px;
      padding: 12px 14px;
      background: #fcfdff;
      line-height: 1.7;
      font-size: 14px;
    }

    .check-item.correct {
      border-color: #a7f3d0;
      background: #ecfdf5;
    }

    .check-item.wrong {
      border-color: #fecaca;
      background: #fef2f2;
    }

    .check-mark {
      font-weight: 800;
      margin-right: 8px;
    }

    .check-item.correct .check-mark {
      color: var(--ok);
    }

    .check-item.wrong .check-mark {
      color: var(--warn);
    }

    .modal-btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .close-note {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      display: none;
    }

    code {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 0.96em;
    }
  </style>
</head>
<body>
  <div class="inner">
    <section class="hero-card">
      <h1>삼각함수 간의 관계 테스트</h1>
      <p>문제는 매번 새롭게 생성됩니다. 2문제를 모두 맞혀야 통과입니다.</p>
    </section>

    <section class="layout">
      <section class="card">
        <div class="top-row">
          <div>
            <span class="pill">test4</span>
          </div>
          <div class="btn-row">
            <button id="newQuizBtn">새 문제 만들기</button>
            <button id="gradeBtn" class="primary-btn">채점하기</button>
          </div>
        </div>

        <div id="quizArea"></div>

        <div id="resultBox" class="result-box">
          문제를 풀고 <strong>채점하기</strong>를 누르세요.
        </div>

      </section>
    </section>
  </div>

  <div id="resultModal" class="modal-backdrop">
    <div class="modal-card">
      <h2 id="modalTitle">채점 결과</h2>
      <p id="modalSummary">결과를 확인하세요.</p>
      <div id="checkList" class="check-list"></div>
      <div class="modal-btn-row">
        <button id="retryBtn" class="primary-btn">다시 풀기</button>
        <button id="closeBtn">그만하고 창 닫기</button>
      </div>
      <div id="closeNote" class="close-note">
        브라우저 설정에 따라 창이 자동으로 닫히지 않을 수 있습니다. 그런 경우 창을 직접 닫아 주세요.
      </div>
    </div>
  </div>

  <script>
    const state = {
      questions: []
    };

    const quizArea = document.getElementById('quizArea');
    const resultBox = document.getElementById('resultBox');
    const newQuizBtn = document.getElementById('newQuizBtn');
    const gradeBtn = document.getElementById('gradeBtn');

    const resultModal = document.getElementById('resultModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalSummary = document.getElementById('modalSummary');
    const checkList = document.getElementById('checkList');
    const retryBtn = document.getElementById('retryBtn');
    const closeBtn = document.getElementById('closeBtn');
    const closeNote = document.getElementById('closeNote');

    const radianPool = [
      '0',
      'π/6',
      'π/4',
      'π/3',
      'π/2',
      '2π/3',
      '3π/4',
      '5π/6',
      'π',
      '7π/6',
      '5π/4',
      '4π/3',
      '3π/2',
      '5π/3',
      '7π/4',
      '11π/6'
    ];

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sampleOne(arr) {
      return arr[randInt(0, arr.length - 1)];
    }

    function makeQuestion1() {
      const angle = sampleOne(radianPool);
      const correct = '1';
      const options = shuffle(['1', '-1', '1/2', '1/3']);

      return {
        prompt: `문제 1. sin<sup>2</sup>${angle} + cos<sup>2</sup>${angle} 의 값은 무엇인가?`,
        options,
        answer: options.indexOf(correct)
      };
    }

    function makeQuestion2() {
      const correct = 'a/b';
      const options = shuffle(['a/b', 'b/a', 'ab', '-a/b']);

      return {
        prompt: '문제 2. sin x = a, cos x = b 일 때, tan x의 값은 무엇인가?',
        options,
        answer: options.indexOf(correct)
      };
    }

    function buildQuiz() {
      state.questions = [
        makeQuestion1(),
        makeQuestion2()
      ];

      renderQuiz();
      resultBox.className = 'result-box';
      resultBox.innerHTML = '문제가 새로 생성되었습니다. 2문제를 모두 풀고 <strong>채점하기</strong>를 누르세요.';
      hideModal();
      localStorage.removeItem('test4Passed');
    }

    function renderQuiz() {
      quizArea.innerHTML = state.questions.map((q, qIndex) => {
        const optionsHtml = q.options.map((opt, optIndex) => {
          return `
            <label class="option-label">
              <input type="radio" name="q${qIndex}" value="${optIndex}">
              <span>${optIndex + 1}. ${opt}</span>
            </label>
          `;
        }).join('');

        return `
          <div class="question-card">
            <div class="q-title">${q.prompt}</div>
            <div class="options">${optionsHtml}</div>
          </div>
        `;
      }).join('');
    }

    function getUserAnswers() {
      const answers = [];

      for (let i = 0; i < state.questions.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) return null;
        answers.push(Number(selected.value));
      }

      return answers;
    }

    function showModal(items, passed) {
      modalTitle.textContent = passed ? '통과했습니다' : '다시 풀어야 합니다';
      modalSummary.innerHTML = passed
        ? '2문제를 모두 맞혔습니다. 결과를 확인한 뒤 창을 닫거나 다시 풀 수 있습니다.'
        : '문제별 결과를 확인해 보세요. 2문제를 모두 맞혀야 통과입니다.';

      checkList.innerHTML = items.map(item => {
        return `
          <div class="check-item ${item.correct ? 'correct' : 'wrong'}">
            <span class="check-mark">${item.correct ? '정답' : '오답'}</span>
            <strong>${item.label}</strong><br>
            ${item.detail}
          </div>
        `;
      }).join('');

      closeNote.style.display = 'none';
      resultModal.classList.add('show');
    }

    function hideModal() {
      resultModal.classList.remove('show');
    }

    function gradeQuiz() {
      const userAnswers = getUserAnswers();

      if (!userAnswers) {
        resultBox.className = 'result-box fail';
        resultBox.innerHTML = '아직 선택하지 않은 문제가 있습니다. 2문제를 모두 답한 뒤 채점하세요.';
        return;
      }

      const items = [];
      let correctCount = 0;

      for (let i = 0; i < state.questions.length; i++) {
        const q = state.questions[i];
        const correct = userAnswers[i] === q.answer;
        if (correct) correctCount++;

        const userText = q.options[userAnswers[i]];
        const correctText = q.options[q.answer];

        items.push({
          label: `${i + 1}번 문제`,
          correct,
          detail: correct
            ? `선택한 답: <strong>${userText}</strong>`
            : `선택한 답: <strong>${userText}</strong><br>정답: <strong>${correctText}</strong>`
        });
      }

      const passed = correctCount === 2;

      if (passed) {
        resultBox.className = 'result-box pass';
        resultBox.innerHTML = '축하합니다. <strong>2문제를 모두 맞혀 통과했습니다.</strong>';
        localStorage.setItem('test4Passed', 'true');

        try {
          if (window.opener && window.opener !== window) {
            window.opener.postMessage({ type: 'testPassed', testId: 'test4' }, '*');
          }
        } catch (e) {}
      } else {
        resultBox.className = 'result-box fail';
        resultBox.innerHTML = `<strong>${correctCount}문제 정답</strong>입니다. 문제별 결과를 확인한 뒤 다시 풀 수 있습니다.`;
        localStorage.removeItem('test4Passed');
      }

      showModal(items, passed);
    }

    function retryQuiz() {
      buildQuiz();
    }

    function closeWindowSafely() {
      window.close();

      setTimeout(() => {
        if (!window.closed) {
          closeNote.style.display = 'block';
        }
      }, 300);
    }

    newQuizBtn.addEventListener('click', buildQuiz);
    gradeBtn.addEventListener('click', gradeQuiz);
    retryBtn.addEventListener('click', retryQuiz);
    closeBtn.addEventListener('click', closeWindowSafely);

    window.addEventListener('load', buildQuiz);
  </script>
</body>
</html>
