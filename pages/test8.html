<!DOCTYPE html>

<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>test8 - 사인 그래프의 변형 테스트</title>
  <link rel="stylesheet" href="../assets/common.css" />
  <style>
    .inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.primary-btn {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.primary-btn:hover {
  background: #1d4ed8;
}

.question-card {
  border: 1px solid #e7eef7;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  background: #fcfdff;
}

.question-card:last-child {
  margin-bottom: 0;
}

.q-title {
  font-size: 18px;
  font-weight: 800;
  margin-bottom: 12px;
  color: #111827;
  line-height: 1.6;
}

.graph-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 8px;
}

.graph-option {
  border: 1px solid #dbe4f0;
  border-radius: 14px;
  padding: 10px;
  background: white;
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.graph-option:hover {
  background: #f8fafc;
  border-color: #bfdbfe;
}

.graph-option input {
  margin-bottom: 8px;
  transform: scale(1.1);
}

.graph-name {
  font-weight: 700;
  margin-left: 6px;
}

.graph-box {
  width: 100%;
  height: 170px;
  border: 1px solid #e5edf6;
  border-radius: 12px;
  background: white;
  overflow: hidden;
  margin-top: 8px;
}

.graph-box canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.result-box {
  margin-top: 16px;
  min-height: 64px;
}

.result-box.pass {
  background: #ecfdf5;
  border-color: #a7f3d0;
  color: #065f46;
}

.result-box.fail {
  background: #fef2f2;
  border-color: #fecaca;
  color: #991b1b;
}

.mini-note {
  color: var(--muted);
  font-size: 13px;
  margin-top: 8px;
  line-height: 1.7;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.38);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 999;
}

.modal-backdrop.show {
  display: flex;
}

.modal-card {
  width: min(560px, 100%);
  background: white;
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 20px 48px rgba(15, 23, 42, 0.18);
}

.modal-card h2 {
  margin: 0 0 10px;
  font-size: 24px;
}

.modal-card p {
  margin: 0 0 12px;
  color: var(--muted);
  line-height: 1.7;
  font-size: 14px;
}

.check-list {
  display: grid;
  gap: 10px;
  margin: 14px 0 18px;
}

.check-item {
  border: 1px solid #e5edf6;
  border-radius: 14px;
  padding: 12px 14px;
  background: #fcfdff;
  line-height: 1.7;
  font-size: 14px;
}

.check-item.correct {
  border-color: #a7f3d0;
  background: #ecfdf5;
}

.check-item.wrong {
  border-color: #fecaca;
  background: #fef2f2;
}

.check-mark {
  font-weight: 800;
  margin-right: 8px;
}

.check-item.correct .check-mark {
  color: var(--ok);
}

.check-item.wrong .check-mark {
  color: var(--warn);
}

.modal-btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

.close-note {
  margin-top: 10px;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  display: none;
}

code {
  font-family: "Consolas", "Courier New", monospace;
  font-size: 0.96em;
}

@media (max-width: 980px) {
  .graph-options {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 720px) {
  .graph-options {
    grid-template-columns: 1fr;
  }
}


  </style>
</head>
<body>
  <div class="inner">
    <section class="hero-card">
      <h1>사인 그래프의 변형 테스트</h1>
      <p>문제는 매번 새롭게 생성됩니다. 3문제를 모두 맞혀야 통과입니다.</p>
    </section>


<section class="layout">
  <section class="card">
    <div class="top-row">
      <div>
        <span class="pill">test8</span>
      </div>
      <div class="btn-row">
        <button id="newQuizBtn">새 문제 만들기</button>
        <button id="gradeBtn" class="primary-btn">채점하기</button>
      </div>
    </div>

    <div id="quizArea"></div>

    <div id="resultBox" class="result-box">
      문제를 풀고 <strong>채점하기</strong>를 누르세요.
    </div>

  </section>
</section>


  </div>

  <div id="resultModal" class="modal-backdrop">
    <div class="modal-card">
      <h2 id="modalTitle">채점 결과</h2>
      <p id="modalSummary">결과를 확인하세요.</p>
      <div id="checkList" class="check-list"></div>
      <div class="modal-btn-row">
        <button id="retryBtn" class="primary-btn">다시 풀기</button>
        <button id="closeBtn">그만하고 창 닫기</button>
      </div>
      <div id="closeNote" class="close-note">
        브라우저 설정에 따라 창이 자동으로 닫히지 않을 수 있습니다. 그런 경우 창을 직접 닫아 주세요.
      </div>
    </div>
  </div>

  <script>
    const state = { questions: [] };

    const quizArea = document.getElementById('quizArea');
    const resultBox = document.getElementById('resultBox');
    const newQuizBtn = document.getElementById('newQuizBtn');
    const gradeBtn = document.getElementById('gradeBtn');

    const resultModal = document.getElementById('resultModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalSummary = document.getElementById('modalSummary');
    const checkList = document.getElementById('checkList');
    const retryBtn = document.getElementById('retryBtn');
    const closeBtn = document.getElementById('closeBtn');
    const closeNote = document.getElementById('closeNote');

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function sampleOne(arr) {
      return arr[randInt(0, arr.length - 1)];
    }

    function piLabel(k) {
      if (k === 0) return '0';
      if (k === 1) return 'π';
      if (k === 2) return '2π';
      if (k === 3) return '3π';
      if (k === 4) return '4π';
      return `${k}π`;
    }

    function drawArrowHead(ctx, x1, y1, x2, y2, size = 7) {
      const angle = Math.atan2(y2 - y1, x2 - x1);
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - size * Math.cos(angle - Math.PI / 6), y2 - size * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(x2 - size * Math.cos(angle + Math.PI / 6), y2 - size * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawGraph(canvas, config) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);

      const left = 34;
      const right = w - 12;
      const top = 16;
      const bottom = h - 28;
      const midY = top + (bottom - top) / 2;

      const yMin = config.yMin ?? -4;
      const yMax = config.yMax ?? 4;
      const xMin = config.xMin;
      const xMax = config.xMax;

      function xToPx(x) {
        return left + (x - xMin) / (xMax - xMin) * (right - left);
      }

      function yToPx(y) {
        return top + (yMax - y) / (yMax - yMin) * (bottom - top);
      }

      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(left, yToPx(0));
      ctx.lineTo(right, yToPx(0));
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(left, top);
      ctx.lineTo(left, bottom);
      ctx.stroke();

      ctx.fillStyle = '#111827';
      drawArrowHead(ctx, right - 12, yToPx(0), right, yToPx(0), 6);
      drawArrowHead(ctx, left, top + 12, left, top, 6);

      ctx.fillStyle = '#475569';
      ctx.font = '12px HCR Batang, 함초롱바탕, serif';

      if (config.xTicks) {
        config.xTicks.forEach(tick => {
          const px = xToPx(tick.value);
          ctx.strokeStyle = '#e2e8f0';
          ctx.beginPath();
          ctx.moveTo(px, yToPx(0) - 4);
          ctx.lineTo(px, yToPx(0) + 4);
          ctx.stroke();
          ctx.fillText(tick.label, px - 10, yToPx(0) + 16);
        });
      }

      if (config.yMarks) {
        config.yMarks.forEach(mark => {
          const py = yToPx(mark.value);
          ctx.strokeStyle = '#e2e8f0';
          ctx.beginPath();
          ctx.moveTo(left - 4, py);
          ctx.lineTo(left + 4, py);
          ctx.stroke();
          ctx.fillText(mark.label, 4, py + 4);
        });
      }

      if (config.asymptotes) {
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = '#94a3b8';
        config.asymptotes.forEach(x => {
          const px = xToPx(x);
          ctx.beginPath();
          ctx.moveTo(px, top);
          ctx.lineTo(px, bottom);
          ctx.stroke();
        });
        ctx.setLineDash([]);
      }

      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = 2;
      ctx.beginPath();

      let started = false;
      const step = (xMax - xMin) / 500;

      for (let x = xMin; x <= xMax + step / 2; x += step) {
        const y = config.func(x);

        if (!isFinite(y) || Math.abs(y) > 20) {
          started = false;
          continue;
        }

        const px = xToPx(x);
        const py = yToPx(y);

        if (!started) {
          ctx.moveTo(px, py);
          started = true;
        } else {
          ctx.lineTo(px, py);
        }
      }

      ctx.stroke();
    }

    function makeAmplitudeQuestion() {
      const targets = [
        { eq: 'y = 1/2 sinx', A: 0.5 },
        { eq: 'y = 2sinx', A: 2 },
        { eq: 'y = 3sinx', A: 3 }
      ];
      const target = sampleOne(targets);

      const ampOptions = targets.map(item => ({
        kind: 'amp',
        eq: item.eq,
        func: x => item.A * Math.sin(x),
        yMarks: [
          { value: item.A, label: String(item.A) },
          { value: -item.A, label: String(-item.A) }
        ]
      }));

      const periodicDistractor = sampleOne([
        {
          kind: 'period',
          eq: 'y = sin2x',
          func: x => Math.sin(2 * x),
          yMarks: [{ value: 1, label: '1' }, { value: -1, label: '-1' }]
        },
        {
          kind: 'period',
          eq: 'y = sin(x/2)',
          func: x => Math.sin(x / 2),
          yMarks: [{ value: 1, label: '1' }, { value: -1, label: '-1' }]
        }
      ]);

      const options = shuffle([
        ...ampOptions,
        periodicDistractor
      ]);

      return {
        kind: 'graph4',
        prompt: `문제 1. <strong>${target.eq}</strong>의 그래프를 고르시오.`,
        options,
        answer: options.findIndex(opt => opt.eq === target.eq),
        config: {
          xMin: 0,
          xMax: 2 * Math.PI,
          xTicks: [
            { value: 0, label: '0' },
            { value: Math.PI / 2, label: 'π/2' },
            { value: Math.PI, label: 'π' },
            { value: 3 * Math.PI / 2, label: '3π/2' },
            { value: 2 * Math.PI, label: '2π' }
          ],
          yMin: -3.5,
          yMax: 3.5
        }
      };
    }

    function makePeriodQuestion() {
      const targets = [
        {
          eq: 'y = sin(x/2)',
          B: 0.5,
          xMax: 4 * Math.PI,
          ticks: [
            { value: 0, label: '0' },
            { value: Math.PI, label: 'π' },
            { value: 2 * Math.PI, label: '2π' },
            { value: 3 * Math.PI, label: '3π' },
            { value: 4 * Math.PI, label: '4π' }
          ]
        },
        {
          eq: 'y = sin2x',
          B: 2,
          xMax: Math.PI,
          ticks: [
            { value: 0, label: '0' },
            { value: Math.PI / 4, label: 'π/4' },
            { value: Math.PI / 2, label: 'π/2' },
            { value: 3 * Math.PI / 4, label: '3π/4' },
            { value: Math.PI, label: 'π' }
          ]
        },
        {
          eq: 'y = sin3x',
          B: 3,
          xMax: 2 * Math.PI / 3,
          ticks: [
            { value: 0, label: '0' },
            { value: Math.PI / 6, label: 'π/6' },
            { value: Math.PI / 3, label: 'π/3' },
            { value: Math.PI / 2, label: 'π/2' },
            { value: 2 * Math.PI / 3, label: '2π/3' }
          ]
        }
      ];

      const target = sampleOne(targets);

      const periodOptions = targets.map(item => ({
        kind: 'period',
        eq: item.eq,
        func: x => Math.sin(item.B * x)
      }));

      const amplitudeDistractor = sampleOne([
        { kind: 'amp', eq: 'y = 2sinx', func: x => 2 * Math.sin(x) },
        { kind: 'amp', eq: 'y = 3sinx', func: x => 3 * Math.sin(x) }
      ]);

      const options = shuffle([
        ...periodOptions,
        amplitudeDistractor
      ]);

      return {
        kind: 'graph4',
        prompt: `문제 2. <strong>${target.eq}</strong>의 그래프를 고르시오.`,
        options,
        answer: options.findIndex(opt => opt.eq === target.eq),
        config: {
          xMin: 0,
          xMax: target.xMax,
          xTicks: target.ticks,
          yMin: -3.5,
          yMax: 3.5,
          yMarks: [{ value: 1, label: '1' }, { value: -1, label: '-1' }]
        }
      };
    }

    function makeShiftQuestion() {
      const targets = [
        {
          eq: 'y = sin(x-π)',
          func: x => Math.sin(x - Math.PI),
          pool: [
            { eq: 'y = sin(x-π)', func: x => Math.sin(x - Math.PI) },
            { eq: 'y = sin(x+π/2)', func: x => Math.sin(x + Math.PI / 2) },
            { eq: 'y = sinx', func: x => Math.sin(x) },
            { eq: 'y = sinx + 2', func: x => Math.sin(x) + 2 }
          ]
        },
        {
          eq: 'y = sin(x-π/2)',
          func: x => Math.sin(x - Math.PI / 2),
          pool: [
            { eq: 'y = sin(x-π/2)', func: x => Math.sin(x - Math.PI / 2) },
            { eq: 'y = sin(x+π/2)', func: x => Math.sin(x + Math.PI / 2) },
            { eq: 'y = sinx', func: x => Math.sin(x) },
            { eq: 'y = sinx - 2', func: x => Math.sin(x) - 2 }
          ]
        },
        {
          eq: 'y = sinx + 2',
          func: x => Math.sin(x) + 2,
          pool: [
            { eq: 'y = sinx + 2', func: x => Math.sin(x) + 2 },
            { eq: 'y = sinx - 2', func: x => Math.sin(x) - 2 },
            { eq: 'y = sinx', func: x => Math.sin(x) },
            { eq: 'y = sin(x-π)', func: x => Math.sin(x - Math.PI) }
          ]
        },
        {
          eq: 'y = sinx - 2',
          func: x => Math.sin(x) - 2,
          pool: [
            { eq: 'y = sinx - 2', func: x => Math.sin(x) - 2 },
            { eq: 'y = sinx + 2', func: x => Math.sin(x) + 2 },
            { eq: 'y = sinx', func: x => Math.sin(x) },
            { eq: 'y = sin(x+π/2)', func: x => Math.sin(x + Math.PI / 2) }
          ]
        }
      ];

      const target = sampleOne(targets);
      const options = shuffle(target.pool);

      return {
        kind: 'graph4',
        prompt: `문제 3. <strong>${target.eq}</strong>의 그래프를 고르시오.`,
        options,
        answer: options.findIndex(opt => opt.eq === target.eq),
        config: {
          xMin: 0,
          xMax: 2 * Math.PI,
          xTicks: [
            { value: 0, label: '0' },
            { value: Math.PI / 2, label: 'π/2' },
            { value: Math.PI, label: 'π' },
            { value: 3 * Math.PI / 2, label: '3π/2' },
            { value: 2 * Math.PI, label: '2π' }
          ],
          yMin: -4,
          yMax: 4,
          yMarks: [
            { value: 2, label: '2' },
            { value: 0, label: '0' },
            { value: -2, label: '-2' }
          ]
        }
      };
    }

    function buildQuiz() {
      state.questions = [
        makeAmplitudeQuestion(),
        makePeriodQuestion(),
        makeShiftQuestion()
      ];

      renderQuiz();
      resultBox.className = 'result-box';
      resultBox.innerHTML = '문제가 새로 생성되었습니다. 3문제를 모두 풀고 <strong>채점하기</strong>를 누르세요.';
      hideModal();
      localStorage.removeItem('test8Passed');
    }

    function renderQuiz() {
      quizArea.innerHTML = state.questions.map((q, qIndex) => {
        const graphHtml = q.options.map((opt, optIndex) => {
          return `
            <label class="graph-option">
              <input type="radio" name="q${qIndex}" value="${optIndex}">
              <span class="graph-name">그래프 ${optIndex + 1}</span>
              <div class="graph-box">
                <canvas id="graphCanvas_${qIndex}_${optIndex}" width="240" height="170"></canvas>
              </div>
            </label>
          `;
        }).join('');

        return `
          <div class="question-card">
            <div class="q-title">${q.prompt}</div>
            <div class="graph-options">${graphHtml}</div>
          </div>
        `;
      }).join('');

      drawAllGraphs();
    }

    function drawAllGraphs() {
      state.questions.forEach((q, qIndex) => {
        q.options.forEach((opt, optIndex) => {
          const canvas = document.getElementById(`graphCanvas_${qIndex}_${optIndex}`);
          if (!canvas) return;

          drawGraph(canvas, {
            func: opt.func,
            xMin: q.config.xMin,
            xMax: q.config.xMax,
            xTicks: q.config.xTicks,
            yMin: q.config.yMin,
            yMax: q.config.yMax,
            yMarks: opt.yMarks || q.config.yMarks || []
          });
        });
      });
    }

    function getUserAnswers() {
      const answers = [];

      for (let i = 0; i < state.questions.length; i++) {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (!selected) return null;
        answers.push(Number(selected.value));
      }

      return answers;
    }

    function showModal(items, passed) {
      modalTitle.textContent = passed ? '통과했습니다' : '다시 풀어야 합니다';
      modalSummary.innerHTML = passed
        ? '3문제를 모두 맞혔습니다. 결과를 확인한 뒤 창을 닫거나 다시 풀 수 있습니다.'
        : '문제별 결과를 확인해 보세요. 3문제를 모두 맞혀야 통과입니다.';

      checkList.innerHTML = items.map(item => {
        return `
          <div class="check-item ${item.correct ? 'correct' : 'wrong'}">
            <span class="check-mark">${item.correct ? '정답' : '오답'}</span>
            <strong>${item.label}</strong><br>
            ${item.detail}
          </div>
        `;
      }).join('');

      closeNote.style.display = 'none';
      resultModal.classList.add('show');
    }

    function hideModal() {
      resultModal.classList.remove('show');
    }

    function gradeQuiz() {
      const userAnswers = getUserAnswers();

      if (!userAnswers) {
        resultBox.className = 'result-box fail';
        resultBox.innerHTML = '아직 선택하지 않은 문제가 있습니다. 3문제를 모두 답한 뒤 채점하세요.';
        return;
      }

      const items = [];
      let correctCount = 0;

      for (let i = 0; i < state.questions.length; i++) {
        const q = state.questions[i];
        const correct = userAnswers[i] === q.answer;
        if (correct) correctCount++;

        const userText = `그래프 ${userAnswers[i] + 1}`;
        const correctText = `그래프 ${q.answer + 1}`;

        items.push({
          label: `${i + 1}번 문제`,
          correct,
          detail: correct
            ? `선택한 답: <strong>${userText}</strong>`
            : `선택한 답: <strong>${userText}</strong><br>정답: <strong>${correctText}</strong>`
        });
      }

      const passed = correctCount === 3;

      if (passed) {
        resultBox.className = 'result-box pass';
        resultBox.innerHTML = '축하합니다. <strong>3문제를 모두 맞혀 통과했습니다.</strong>';
        localStorage.setItem('test8Passed', 'true');

        try {
          if (window.opener && window.opener !== window) {
            window.opener.postMessage({ type: 'testPassed', testId: 'test8' }, '*');
          }
        } catch (e) {}
      } else {
        resultBox.className = 'result-box fail';
        resultBox.innerHTML = `<strong>${correctCount}문제 정답</strong>입니다. 문제별 결과를 확인한 뒤 다시 풀 수 있습니다.`;
        localStorage.removeItem('test8Passed');
      }

      showModal(items, passed);
    }

    function retryQuiz() {
      buildQuiz();
    }

    function closeWindowSafely() {
      window.close();

      setTimeout(() => {
        if (!window.closed) {
          closeNote.style.display = 'block';
        }
      }, 300);
    }

    newQuizBtn.addEventListener('click', buildQuiz);
    gradeBtn.addEventListener('click', gradeQuiz);
    retryBtn.addEventListener('click', retryQuiz);
    closeBtn.addEventListener('click', closeWindowSafely);

    window.addEventListener('load', buildQuiz);
  </script>

</body>
</html>
